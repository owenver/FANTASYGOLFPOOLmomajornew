name: Update Golf Scores

on:
  schedule:
    # Every 10 min during golf hours (11am–midnight UTC = 7am–8pm ET)
    # Masters 2026: Apr 9-12
    - cron: "*/10 11-23 9-12 4 *"  # Masters Thu-Sun
  workflow_dispatch: # Allow manual trigger from GitHub

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run score updater
        env:
          FIREBASE_PASS: ${{ secrets.FIREBASE_PASS }}
          RUN_ONCE: "true"
        run: node score-updater.mjs
